<!DOCTYPE html>
<html>
    <head>
        <title>Array pop</title>
        <script src="arrayPop.js"></script>
    </head>
    <body>
        <h2>Array pop</h2>
        <p>Enter your favourite vegitables names:</p>
        <label for="lblVegitables">Vegitables:</label>
        <input id="txtVegitables" type="text" placeholder="Enter vegitables names">
        <br>
        <button id="btnAdd" onclick="onClickAdd()">Add</button>
        <div id="divAdd"></div>
        <button id="btnRemove" onclick="onClickRemove()">Remove</button>
        <div id="divRemove"></div>
        <button id="btnShift" onclick="onClickShift()">Shift</button>
        <div id="divShif"></div>
        <button id="btnUnShift" onclick="onClickUnShift()">UnShift</button>
        <div id="divUnShif"></div>
    </body>
</html>
