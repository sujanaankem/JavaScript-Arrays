<!DOCTYPE html>
<html>
    <head>
        <title>Array Slice</title>
        <script src="arraySlice.js"></script>
    </head>
    <body>
        <h2>Enter few animals names:</h2>
        <label for="lblAnimal">Names of animals</label>
        <input id="txtAnimal" type="text">
        <br>
        <button id="btnPush" onclick="onClickPush()">Push</button>
        <div id="divPush"></div>
        <button id="btnPop" onclick="onClickPop()">Pop</button>
        <div id="divPop"></div>
        <label for="lblStart">Start index:</label>
        <input id="txtStart" type="number">
        <label for="lblEnd">End index:</label>
        <input id="txtEnd" type="number">
        <button id="btnSlice" onclick="onClickSliceSplice()">Slice & Splice</button>
        <div id="divSlice"></div>
        
    </body>
</html>
