<!DOCTYPE html>
<html>
    <head>
        <title>Array includes</title>
        <script src="arrayIncludes.js"></script>
    </head>
    <body>
        <h2>Array includes</h2>
        <label for="lblIncludes">Cities:</label>
        <input id="txtIncludes" type="text">
        <br>
        <label for="lblIndexOf">Index</label>
        <input id="txtIndexOf" type="text" placeholder="Enter a letter to check index">
        <button id="btnIncludes" onclick="onClickCheck()">Check</button>
        <div id="divIncludes"></div>
        <div id="divIndexOf"></div>
        <hr>
        <label for="lblWord">Word</label>
        <input id="txtWord" type="text" placeholder="Enter a word">
        <br>
        <label for="lblIndex">Index</label>
        <input id="txtIndex" type="text" placeholder="Enter a letter to check index">
        <button id="btnIndexCheck" onclick="onClickIndexCheck()">Index Check</button>
        <div id="divIndex"></div>
    </body>
</html>
