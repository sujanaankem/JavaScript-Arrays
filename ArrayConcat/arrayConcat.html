<!DOCTYPE html>
<html>
    <head>
        <title>Array Concat</title>
        <script src="arrayConcat.js"></script>
    </head>
    <body>
        <h2>Array Concat</h2>
        <p>Names of students in the class</p>
        <lable for="lblGirls">Girls Names</lable>
        <input id="txtGirls" type="text">
        <button id="btnGirls" onclick="onClickGirls()">Girls</button>
        <lable for="lblBoys">Boys Names</lable>
        <input id="txtBoys" type="text">
        <button id="btnBoys" onclick="onClickBoys()">Boys</button>
        <button id="btnConcat" onclick="onClickConcat()">All</button>
        <div id="divGirls"></div>
        <div id="divBoys"></div>
        <div id="divConcat"></div>
    </body>
</html>
